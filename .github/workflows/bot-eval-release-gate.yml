name: Bot Eval Release Gate

on:
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      profile:
        description: Which gate profile to run
        required: true
        default: pr
        type: choice
        options:
          - pr
          - nightly

permissions:
  contents: read

concurrency:
  group: bot-eval-release-gate-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://127.0.0.1:11434' }}
  BOT_EVAL_MODEL: ${{ vars.BOT_EVAL_MODEL || 'qwen2.5-coder:14b' }}
  BOT_EVAL_PLANNER_MODEL: ${{ vars.BOT_EVAL_PLANNER_MODEL || 'deepseek-r1:8b' }}
  BOT_EVAL_REVIEWER_MODEL: ${{ vars.BOT_EVAL_REVIEWER_MODEL || 'qwen2.5:3b' }}
  BOT_EVAL_JSON_REPAIR_MODEL: ${{ vars.BOT_EVAL_JSON_REPAIR_MODEL || 'qwen2.5:7b' }}
  BOT_EVAL_DETERMINISTIC_FALLBACK: ${{ vars.BOT_EVAL_DETERMINISTIC_FALLBACK || 'on-fail' }}
  BOT_EVAL_TIMEOUT_SEC: ${{ vars.BOT_EVAL_TIMEOUT_SEC || '1200' }}
  BOT_EVAL_MAX_ITERATIONS: ${{ vars.BOT_EVAL_MAX_ITERATIONS || '6' }}
  BOT_EVAL_HARD_TIMEOUT_SEC: ${{ vars.BOT_EVAL_HARD_TIMEOUT_SEC || '1200' }}
  BOT_EVAL_PYTHON: C:\actions-runner\python312\python.exe
  BOT_EVAL_BASELINE_DIR: ''
  BOT_EVAL_RUN_ROOT: ${{ vars.BOT_EVAL_RUN_ROOT || 'C:\actions-runner\bot_eval_run' }}

jobs:
  gate-pr:
    if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) || (github.event_name == 'workflow_dispatch' && inputs.profile == 'pr')
    runs-on: ${{ vars.BOT_EVAL_RUNNER || 'self-hosted' }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            package.json
            package-lock.json
            tsconfig.json
            tsconfig.test.json
            scripts
            src
            test
            projects/bot_eval_run/release_baseline.txt
          sparse-checkout-cone-mode: false

      - name: Check runner capabilities
        id: caps
        shell: powershell
        run: |
          $baseUrl = if ($env:OLLAMA_BASE_URL) { $env:OLLAMA_BASE_URL } else { 'http://127.0.0.1:11434' }
          try {
            $null = Invoke-WebRequest -Uri "$baseUrl/api/tags" -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
            Add-Content -Path $env:GITHUB_OUTPUT -Value "ready=true"
            Write-Host "Ollama reachable at $baseUrl — gate-pr will run"
          } catch {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "ready=false"
            Write-Host "::notice::Ollama not reachable at $baseUrl — gate-pr steps will be skipped"
          }

      - name: Setup Node.js
        if: steps.caps.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.caps.outputs.ready == 'true'
        shell: powershell
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify Ollama connectivity
        if: steps.caps.outputs.ready == 'true'
        shell: powershell
        run: |
          $baseUrl = $env:OLLAMA_BASE_URL
          if ([string]::IsNullOrWhiteSpace($baseUrl)) { $baseUrl = "http://127.0.0.1:11434" }
          curl.exe --fail --silent --show-error "$baseUrl/api/tags" > $null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Ollama reachable at $baseUrl" 

      - name: Resolve baseline directory
        if: steps.caps.outputs.ready == 'true'
        id: baseline
        shell: powershell
        run: |
          $candidate = $env:BOT_EVAL_BASELINE_DIR
          if ($null -eq $candidate) { $candidate = '' }
          $candidate = $candidate.Trim()
          if ([string]::IsNullOrWhiteSpace($candidate)) {
            $pointerPath = Join-Path $PWD 'projects/bot_eval_run/release_baseline.txt'
            if (Test-Path $pointerPath) { $candidate = (Get-Content -Raw $pointerPath).Trim() }
          }
          if ([string]::IsNullOrWhiteSpace($candidate)) {
            throw 'Release-gate baseline missing. Set repo variable BOT_EVAL_BASELINE_DIR or update projects/bot_eval_run/release_baseline.txt.'
          }
          $resolved = [System.IO.Path]::GetFullPath($candidate)
          $resultsPath = Join-Path $resolved 'results.json'
          if (-not (Test-Path $resultsPath)) {
            throw "Baseline directory is invalid (results.json missing): $resultsPath"
          }
          "baseline_dir=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using baseline: $resolved" 

      - name: Run release gate (3x3)
        if: steps.caps.outputs.ready == 'true'
        id: gate
        shell: powershell
        run: |
          $outDir = "projects/bot_eval_run/release_gate_ci_pr_${env:GITHUB_RUN_ID}_${env:GITHUB_RUN_ATTEMPT}"
          "out_dir=$outDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          npm run bot:eval:release-gate:ci -- --runs 3 --baseline "${{ steps.baseline.outputs.baseline_dir }}" --outDir "$outDir"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload gate artifacts
        if: steps.caps.outputs.ready == 'true' && always() && steps.gate.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: bot-eval-release-gate-pr-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            ${{ steps.gate.outputs.out_dir }}/results.json
            ${{ steps.gate.outputs.out_dir }}/summary.json
            ${{ steps.gate.outputs.out_dir }}/compare.json

      - name: Cleanup old bot-eval directories (PR)
        if: steps.caps.outputs.ready == 'true' && always()
        shell: powershell
        run: |
          npm run bot:eval:cleanup -- --root projects/bot_eval_run --policy "release_gate_ci_pr_:10" --out "${{ steps.gate.outputs.out_dir }}/cleanup_report.json"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  gate-nightly:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.profile == 'nightly')
    runs-on: ${{ vars.BOT_EVAL_RUNNER || 'self-hosted' }}
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            package.json
            package-lock.json
            tsconfig.json
            tsconfig.test.json
            scripts
            src
            test
            projects/bot_eval_run/release_baseline.txt
          sparse-checkout-cone-mode: false

      - name: Check runner capabilities
        id: caps
        shell: powershell
        run: |
          $baseUrl = if ($env:OLLAMA_BASE_URL) { $env:OLLAMA_BASE_URL } else { 'http://127.0.0.1:11434' }
          try {
            $null = Invoke-WebRequest -Uri "$baseUrl/api/tags" -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
            Add-Content -Path $env:GITHUB_OUTPUT -Value "ready=true"
            Write-Host "Ollama reachable at $baseUrl — gate-nightly will run"
          } catch {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "ready=false"
            Write-Host "::notice::Ollama not reachable at $baseUrl — gate-nightly steps will be skipped"
          }

      - name: Setup Node.js
        if: steps.caps.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.caps.outputs.ready == 'true'
        shell: powershell
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Ensure persistent bot-eval run root
        if: steps.caps.outputs.ready == 'true'
        shell: powershell
        run: |
          if (-not (Test-Path $env:BOT_EVAL_RUN_ROOT)) {
            New-Item -ItemType Directory -Path $env:BOT_EVAL_RUN_ROOT | Out-Null
          }
          Write-Host "Using BOT_EVAL_RUN_ROOT=$env:BOT_EVAL_RUN_ROOT" 

      - name: Verify Ollama connectivity
        if: steps.caps.outputs.ready == 'true'
        shell: powershell
        run: |
          $baseUrl = $env:OLLAMA_BASE_URL
          if ([string]::IsNullOrWhiteSpace($baseUrl)) { $baseUrl = "http://127.0.0.1:11434" }
          curl.exe --fail --silent --show-error "$baseUrl/api/tags" > $null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Ollama reachable at $baseUrl" 

      - name: Resolve baseline directory
        if: steps.caps.outputs.ready == 'true'
        id: baseline
        shell: powershell
        run: |
          $candidate = $env:BOT_EVAL_BASELINE_DIR
          if ($null -eq $candidate) { $candidate = '' }
          $candidate = $candidate.Trim()
          if ([string]::IsNullOrWhiteSpace($candidate)) {
            $pointerPath = Join-Path $PWD 'projects/bot_eval_run/release_baseline.txt'
            if (Test-Path $pointerPath) { $candidate = (Get-Content -Raw $pointerPath).Trim() }
          }
          if ([string]::IsNullOrWhiteSpace($candidate)) {
            throw 'Release-gate baseline missing. Set repo variable BOT_EVAL_BASELINE_DIR or update projects/bot_eval_run/release_baseline.txt.'
          }
          $resolved = [System.IO.Path]::GetFullPath($candidate)
          $resultsPath = Join-Path $resolved 'results.json'
          if (-not (Test-Path $resultsPath)) {
            throw "Baseline directory is invalid (results.json missing): $resultsPath"
          }
          "baseline_dir=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using baseline: $resolved" 

      - name: Run release gate (15x3)
        if: steps.caps.outputs.ready == 'true'
        id: gate
        shell: powershell
        run: |
          $outDir = Join-Path $env:BOT_EVAL_RUN_ROOT "release_gate_ci_nightly_${env:GITHUB_RUN_ID}_${env:GITHUB_RUN_ATTEMPT}"
          "out_dir=$outDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          npm run bot:eval:release-gate -- --gateConfig scripts/config/botEvalGate.nightly.json --runs 15 --baseline "${{ steps.baseline.outputs.baseline_dir }}" --outDir "$outDir"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Resolve trend input runs
        if: steps.caps.outputs.ready == 'true' && steps.gate.conclusion == 'success'
        id: trend
        shell: powershell
        run: |
          $root = [System.IO.Path]::GetFullPath($env:BOT_EVAL_RUN_ROOT)
          if (-not (Test-Path $root)) { throw "Nightly run root missing: $root" }
          $dirs = @(Get-ChildItem $root -Directory | Where-Object { $_.Name -like 'release_gate_ci_nightly_*' } | Where-Object { (Test-Path (Join-Path $_.FullName 'summary.json')) -and (Test-Path (Join-Path $_.FullName 'compare.json')) } | Sort-Object LastWriteTime -Descending | Select-Object -First 3 -ExpandProperty FullName)
          if ($dirs.Count -eq 0) { throw 'No completed nightly run directories found for trend aggregation.' }
          $inputs = ($dirs -join ',')
          "trend_inputs=$inputs" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Trend inputs: $inputs" 

      - name: Build stability trend report
        if: steps.caps.outputs.ready == 'true' && steps.gate.conclusion == 'success'
        shell: powershell
        run: |
          npm run bot:eval:stability:aggregate -- --inputs "${{ steps.trend.outputs.trend_inputs }}" --out "${{ steps.gate.outputs.out_dir }}/stability_aggregate.json" --outMd "${{ steps.gate.outputs.out_dir }}/stability_aggregate.md"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Latency guard (+25%)
        if: steps.caps.outputs.ready == 'true' && steps.gate.conclusion == 'success'
        id: latency_guard
        shell: powershell
        run: |
          $outDir = '${{ steps.gate.outputs.out_dir }}'
          $outDirAbs = if ([System.IO.Path]::IsPathRooted($outDir)) { [System.IO.Path]::GetFullPath($outDir) } else { [System.IO.Path]::GetFullPath((Join-Path $PWD $outDir)) }
          $comparePath = Join-Path $outDirAbs 'compare.json'
          if (-not (Test-Path $comparePath)) { throw "Missing compare report: $comparePath" }
          $report = Get-Content -Raw $comparePath | ConvertFrom-Json
          $maxMultiplier = 1.25
          $violations = @()
          foreach ($row in @($report.scenarios)) {
            $scenario = [string]$row.scenario
            $baseAvg = [double]$row.baseline.avgMs
            $candAvg = [double]$row.candidate.avgMs
            $limit = [double]($baseAvg * $maxMultiplier)
            if ($baseAvg -le 0) {
              $violations += [pscustomobject]@{ scenario = $scenario; baselineAvgMs = $baseAvg; candidateAvgMs = $candAvg; limitAvgMs = $limit; reason = 'baselineAvgMs <= 0' }
              continue
            }
            if ($candAvg -gt $limit) {
              $violations += [pscustomobject]@{ scenario = $scenario; baselineAvgMs = $baseAvg; candidateAvgMs = $candAvg; limitAvgMs = $limit; reason = 'candidate avgMs exceeds 1.25x baseline' }
            }
          }
          $outPath = Join-Path $outDirAbs 'latency_guard.json'
          $guard = [pscustomobject]@{ generatedAt = (Get-Date).ToString('o'); outDir = $outDirAbs; comparePath = $comparePath; maxAllowedMultiplier = $maxMultiplier; passed = ($violations.Count -eq 0); violations = $violations }
          $guard | ConvertTo-Json -Depth 8 | Out-File -FilePath $outPath -Encoding utf8
          if ($violations.Count -gt 0) {
            Write-Host "Latency guard FAILED. Report: $outPath"
            throw "Latency guard failed with $($violations.Count) violation(s)."
          }
          Write-Host "Latency guard PASSED. Report: $outPath" 

      - name: Trend quality guard
        if: steps.caps.outputs.ready == 'true' && steps.gate.conclusion == 'success'
        id: trend_guard
        shell: powershell
        run: |
          $outDir = '${{ steps.gate.outputs.out_dir }}'
          $outDirAbs = if ([System.IO.Path]::IsPathRooted($outDir)) { [System.IO.Path]::GetFullPath($outDir) } else { [System.IO.Path]::GetFullPath((Join-Path $PWD $outDir)) }
          $aggregatePath = Join-Path $outDirAbs 'stability_aggregate.json'
          if (-not (Test-Path $aggregatePath)) { throw "Missing stability aggregate report: $aggregatePath" }
          $agg = Get-Content -Raw $aggregatePath | ConvertFrom-Json
          $violations = @()
          if (-not [bool]$agg.allGatePassed) {
            $violations += [pscustomobject]@{ scope = 'aggregate'; message = 'allGatePassed is false' }
          }
          foreach ($row in @($agg.scenarios)) {
            $scenario = [string]$row.scenario
            $rawMin = [double]$row.rawRunPassRate.min
            if ($rawMin -lt 1) { $violations += [pscustomobject]@{ scope = 'scenario'; scenario = $scenario; metric = 'rawRunPassRate.min'; actual = $rawMin; expected = 1 } }
            $fallbackMax = [double]$row.fallbackDependencyRunRate.max
            if ($fallbackMax -gt 0) { $violations += [pscustomobject]@{ scope = 'scenario'; scenario = $scenario; metric = 'fallbackDependencyRunRate.max'; actual = $fallbackMax; expected = 0 } }
            $parse = $row.parseErrorRunsTotal
            $planner = [int]$parse.planner; $jsonRepair = [int]$parse.jsonRepair; $schema = [int]$parse.schema
            $jsonParse = [int]$parse.jsonParse; $placeholder = [int]$parse.placeholder; $other = [int]$parse.other
            if (($planner + $jsonRepair + $schema + $jsonParse + $placeholder + $other) -gt 0) {
              $violations += [pscustomobject]@{ scope = 'scenario'; scenario = $scenario; metric = 'parseErrorRunsTotal'; planner = $planner; jsonRepair = $jsonRepair; schema = $schema; jsonParse = $jsonParse; placeholder = $placeholder; other = $other; expectedAllZero = $true }
            }
          }
          $outPath = Join-Path $outDirAbs 'trend_guard.json'
          $guard = [pscustomobject]@{ generatedAt = (Get-Date).ToString('o'); outDir = $outDirAbs; aggregatePath = $aggregatePath; passed = ($violations.Count -eq 0); violations = $violations }
          $guard | ConvertTo-Json -Depth 8 | Out-File -FilePath $outPath -Encoding utf8
          if ($violations.Count -gt 0) {
            Write-Host "Trend quality guard FAILED. Report: $outPath"
            throw "Trend quality guard failed with $($violations.Count) violation(s)."
          }
          Write-Host "Trend quality PASSED. Report: $outPath" 

      - name: Build nightly calibration recommendation
        if: steps.caps.outputs.ready == 'true' && steps.gate.conclusion == 'success' && steps.trend_guard.conclusion == 'success'
        shell: powershell
        run: |
          npm run bot:eval:nightly:calibrate -- --window 10 --root $env:BOT_EVAL_RUN_ROOT --out "${{ steps.gate.outputs.out_dir }}/calibration_recommendation.json" --outMd "${{ steps.gate.outputs.out_dir }}/calibration_recommendation.md"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Guarded baseline promotion
        if: steps.caps.outputs.ready == 'true' && steps.gate.conclusion == 'success' && steps.latency_guard.conclusion == 'success' && steps.trend_guard.conclusion == 'success'
        shell: powershell
        run: |
          npm run bot:eval:baseline:promote -- --candidate "${{ steps.gate.outputs.out_dir }}" --stable "${{ steps.baseline.outputs.baseline_dir }}" --state "C:\actions-runner\release_gate_promotion_state_node_api.json" --requiredConsecutive 2 --scenario "node-api-oracle" --minRawRunPassRate 1 --maxFallbackDependencyRunRate 0 --out "${{ steps.gate.outputs.out_dir }}/baseline_promotion.json"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload gate artifacts
        if: steps.caps.outputs.ready == 'true' && always() && steps.gate.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: bot-eval-release-gate-nightly-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            ${{ steps.gate.outputs.out_dir }}/results.json
            ${{ steps.gate.outputs.out_dir }}/summary.json
            ${{ steps.gate.outputs.out_dir }}/compare.json
            ${{ steps.gate.outputs.out_dir }}/stability_aggregate.json
            ${{ steps.gate.outputs.out_dir }}/stability_aggregate.md
            ${{ steps.gate.outputs.out_dir }}/latency_guard.json
            ${{ steps.gate.outputs.out_dir }}/trend_guard.json
            ${{ steps.gate.outputs.out_dir }}/calibration_recommendation.json
            ${{ steps.gate.outputs.out_dir }}/calibration_recommendation.md
            ${{ steps.gate.outputs.out_dir }}/baseline_promotion.json

      - name: Cleanup old bot-eval directories (nightly)
        if: steps.caps.outputs.ready == 'true' && always()
        shell: powershell
        run: |
          npm run bot:eval:cleanup -- --root $env:BOT_EVAL_RUN_ROOT --policy "release_gate_ci_nightly_:10" --policy "release_gate_ci_pr_:10" --out "${{ steps.gate.outputs.out_dir }}/cleanup_report.json"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
